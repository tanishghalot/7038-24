<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Topic Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #DEF2F1;
      padding: 20px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 15px;
      border: 1px solid black;
      border-radius: 15px;
      font-size: 26px;
      font-weight: bold;
      background: #78E7E0 ;
      color: #17252a;
      margin-bottom: 30px;
    }

    /* Query Box */
    .query-box {
      background: #DEF2F1;
      border: 0px solid black;
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .query-title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 15px;
      background: #78E7E0 ;
      color: black;
      cursor: pointer;
    }

    button:hover {
      background: #2B7A78;
    }

    /* Answer Section */
    .answer {
      display: none;
      margin-top: 15px;
      border-top: 2px solid black;
      padding-top: 10px;
    }

    .answer-container {
      display: flex;
      gap: 20px;
    }

    .query-code {
      width: 50%;
      background: #DEF2F1;
      padding: 10px;
      border: 1px solid black;
      border-radius: 5px;
      font-family: monospace;
    }

    .output {
      width: 50%;
      background: #DEF2F1;
      padding: 10px;
      border: 1px solid black;
      border-radius: 5px;
      font-family: monospace;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 5px;
    }

    th, td {
      border: 1px solid black;
      border-radius: 5px;
      padding: 6px;
      text-align: center;
    }

    /* Responsive */
    @media (max-width: 700px) {
      .answer-container {
        flex-direction: column;
      }

      .query-code, .output {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <!-- Topic Title -->
  <div class="header" id="PLIF">
    PL:OUTPUT,VARIABLE,DATATYPE
  </div>

  <!-- Query List -->
  <div id="queryList"></div>

  <script>
    // SAMPLE DATA (EDIT THIS)
    const topicData = {
      title: "PL :IF,ELSIF",
      queries: [
        {
  question: "Write a PL/SQL block to check if a number is positive. (IF Statement)",
sql : `DECLARE
    N NUMBER;
BEGIN
    N := &NUMERICAL_VALUE;
    IF N >= 0 THEN
        DBMS_OUTPUT.PUT_LINE('THE ENTERED NUMBER IS POSTIVE ');
    ELSE
        DBMS_OUTPUT.PUT_LINE('THE ENTERED NUMBER IS NEGATIVE ');
    END IF;

END;`,
  output: "THE ENTERED NUMBER IS NEGATIVE"
},
{
  question: "Write a PL/SQL block to check if an employee’s salary is greater than 3000. (IF Statement)",
sql : `DECLARE
    S NUMBER;
BEGIN
    S := &SALARY;
    IF S > 3000 THEN
        DBMS_OUTPUT.PUT_LINE('THE SALARY OF THE EMPLOYEE IS GREATER THAN 3000');

END;`,

{
  question: "Write a PL/SQL block to check if a given number is even. (IF Statement)",

    N NUMBER;

    N := &NUMERIC_VALUE;

  question: "Write a PL/SQL block to check whether a number is even or odd. (IF-ELSE Statement)",

 AVERAGE CONSTANT NUMBER := 3480;
 num number;

A NUMBER;
B NUMBER;
C NUMBER;

  question: "Write a PL/SQL block to categorize salary. (IF-ELSIF-ELSE)",

BEGIN
    SALARY :=&SALARY;

        DBMS_OUTPUT.PUT_LINE('IT IS HIGH SALARY ');

  "output": "IT IS LOW SALARY "

{
  question: "Write a PL/SQL block using CASE to display day of week. (CASE Statement)",
sql : `DECLARE 
    NUM VARCHAR2(10); -- corrected datatype
BEGIN
    NUM := CASE &NUMERIC_VALUE
               WHEN 1 THEN 'SUNDAY'
               WHEN 2 THEN 'MONDAY'
               WHEN 3 THEN 'TUESDAY'
               WHEN 4 THEN 'WEDNESDAY'
               WHEN 5 THEN 'THURSDAY'
               WHEN 6 THEN 'FRIDAY'
               WHEN 7 THEN 'SATURDAY'
               ELSE 'INVALID NUMBER'  -- optional
           END;
    DBMS_OUTPUT.PUT_LINE('RESULT IS :' || NUM);
END;`,
  "output": "RESULT IS :TUESDAY"
},
{
question: "Write a PL/SQL block to categorize salary. (IF-ELSIF-ELSE)",
sql : `DECLARE
    SALARY NUMBER :=&NUMERIC_VALUE;
    LEVEL  VARCHAR(20);
BEGIN
    LEVEL := CASE
              WHEN SALARY>5000 THEN 'HIGH'
              WHEN SALARY<5000 AND SALARY>3000 THEN 'MEDIUM'
              WHEN SALARY>3000 THEN 'LOW'
              ELSE 'INVALID SALARY'
            END;
    DBMS_OUTPUT.PUT_LINE('SALARY '||SALARY);
    DBMS_OUTPUT.PUT_LINE('LEVEL '||LEVEL);
END;`,
  "output": "HIGH"
},
{
  question: "Write a PL/SQL block using CASE to assign grades. (CASE Statement)",
sql : `DECLARE
    marks NUMBER := &ENTER_MARKS;  
    grade VARCHAR2(2);             
BEGIN
    grade := CASE 
                   WHEN marks >= 90 THEN 'A+'
                   WHEN marks >= 80 THEN 'A'
                   WHEN marks >= 70 THEN 'B+'
                   WHEN marks >= 60 THEN 'B'
                   WHEN marks >= 50 THEN 'C'
                   ELSE 'F'
               END;

    DBMS_OUTPUT.PUT_LINE('Marks: ' || marks);
    DBMS_OUTPUT.PUT_LINE('Grade: ' || grade);
END;`,
  "output": "C"
},
{
  question: "Write a PL/SQL block using CASE to check even/odd. (CASE Statement)",
sql : `DECLARE
    NUM NUMBER :=&NUMERIC_VALUE;
    CH VARCHAR2(10);
BEGIN
    CH := CASE
                WHEN MOD(NUM,2) = 0 THEN 'EVEN'
                ELSE 'ODD'
            END;
    DBMS_OUTPUT.PUT_LINE('NUMBER'||NUM);
    DBMS_OUTPUT.PUT_LINE('CHECKED AS '||CH);
END;   `,
  "output": "EVEN"
},
{
  question: "Write a PL/SQL block using CASE to display department name. (CASE Statement)",
sql : `DECLARE
    DEPT SCOTT.DEPT.DEPTNO%TYPE :=&NUMERIC_VALUE;

PL/SQL procedure successfully completed.`

{
  question: "Write a PL/SQL block to exit loop when number reaches 5. (EXIT Statement)",
sql : `DECLARE
    NUM NUMBER;
BEGIN
    NUM := 1;
    WHILE NUM<=20 LOOP
        IF NUM = 5 THEN
            EXIT;
        END IF;  
        DBMS_OUTPUT.PUT_LINE(NUM);
        NUM := NUM + 1;
    END LOOP;
END;`,
  "output": "1 2 3 4"
},
{
  question: "Write a PL/SQL block to simulate login system. (IF-ELSE Practical)",
sql : `DECLARE
    v_username VARCHAR2(20) := 'admin';
    v_password VARCHAR2(20) := '1234';

    u_name VARCHAR2(20);
    u_pass VARCHAR2(20);
BEGIN
    -- Take input
    u_name := '&Enter_Username';
    u_pass := '&Enter_Password';

    -- Check login
    IF u_name = v_username AND u_pass = v_password THEN
        DBMS_OUTPUT.PUT_LINE('Login Successful');
    ELSE
        DBMS_OUTPUT.PUT_LINE('Invalid Username or Password');
    END IF;
END;`,
  "output": "Login Successful"
}
             ]
    };

    // Set Title
    document.getElementById("PLIF").innerText = topicData.title;

    const container = document.getElementById("queryList");

    // Create Queries
    topicData.queries.forEach((q, index) => {
      const div = document.createElement("div");
      div.className = "query-box";

      div.innerHTML = `
        <div class="query-title">
          (${index + 1}) ${q.question}
        </div>

        <button onclick="toggleAnswer(${index})">
          Show Answer
        </button>

        <div class="answer" id="answer-${index}">
          <div class="answer-container">
            
            <div class="query-code">
              <PRE>${q.sql}</PRE>
            </div>

            <div class="output">
              ${q.output}
            </div>

          </div>
        </div>
      `;

      container.appendChild(div);
    });

    // Toggle Answer
    function toggleAnswer(index) {
      const ans = document.getElementById(`answer-${index}`);
      ans.style.display = ans.style.display === "block" ? "none" : "block";
    }

  </script>

</body>
</html>
