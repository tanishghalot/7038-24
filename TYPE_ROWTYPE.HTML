<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Topic Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #DEF2F1;
      padding: 20px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 15px;
      border: 1px solid black;
      border-radius: 15px;
      font-size: 26px;
      font-weight: bold;
      background: #78E7E0 ;
      color: #17252a;
      margin-bottom: 30px;
    }

    /* Query Box */
    .query-box {
      background: #DEF2F1;
      border: 0px solid black;
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .query-title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 15px;
      background: #78E7E0 ;
      color: black;
      cursor: pointer;
    }

    button:hover {
      background: #2B7A78;
    }

    /* Answer Section */
    .answer {
      display: none;
      margin-top: 15px;
      border-top: 2px solid black;
      padding-top: 10px;
    }

    .answer-container {
      display: flex;
      gap: 20px;
    }

    .query-code {
      width: 50%;
      background: #DEF2F1;
      padding: 10px;
      border: 1px solid black;
      border-radius: 5px;
      font-family: monospace;
    }

    .output {
      width: 50%;
      background: #DEF2F1;
      padding: 10px;
      border: 1px solid black;
      border-radius: 5px;
      font-family: monospace;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 5px;
    }

    th, td {
      border: 1px solid black;
      border-radius: 5px;
      padding: 6px;
      text-align: center;
    }

    /* Responsive */
    @media (max-width: 700px) {
      .answer-container {
        flex-direction: column;
      }

      .query-code, .output {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <!-- Topic Title -->
  <div class="header" id="PLTY">
    PL:%TYPE AND %ROWTYPE
  </div>

  <!-- Query List -->
  <div id="queryList"></div>

      ]
    };

    // Set Title
    document.getElementById("PLTY").innerText = topicData.title;

    const container = document.getElementById("queryList");

    // Create Queries
    topicData.queries.forEach((q, index) => {
      const div = document.createElement("div");
      div.className = "query-box";

      div.innerHTML = `
        <div class="query-title">
          (${index + 1}) ${q.question}
        </div>

        <button onclick="toggleAnswer(${index})">
          Show Answer
        </button>

        <div class="answer" id="answer-${index}">
          <div class="answer-container">
            
            <div class="query-code">
              <PRE>${q.sql}</PRE>
            </div>

            <div class="output">
              ${q.output}
            </div>

          </div>
        </div>
      `;

      container.appendChild(div);
    });

    // Toggle Answer
    function toggleAnswer(index) {
      const ans = document.getElementById(`answer-${index}`);
      ans.style.display = ans.style.display === "block" ? "none" : "block";
    }

  </script>

</body>
</html>
